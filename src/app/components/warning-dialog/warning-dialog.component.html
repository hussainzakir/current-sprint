<h1 mat-dialog-title> {{data.title}}</h1>
<div mat-dialog-content class="mat-typography">
  <h3 > {{data.lable}}</h3>
   
</div>
<div mat-dialog-actions align="end">
  <button mat-button  [mat-dialog-close]="data.actionNo">{{data.actionNo}}</button>
  <button mat-button   [mat-dialog-close]="data.actionYes" cdkFocusInitial>{{data.actionYes}}</button>
</div>
